services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./best_resnet50_beet_model-99.keras:/app/best_resnet50_beet_model-99.keras:ro
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3

  test-backend:
    build: .
    command: pytest tests/ -v --tb=short
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - ./best_resnet50_beet_model-99.keras:/app/best_resnet50_beet_model-99.keras:ro
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3
